<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f43f5e;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#grad)"/>

  <!-- Abstract tab stack - 3 layered tabs -->
  <g fill="#ffffff">
    <!-- Back tab -->
    <rect x="24" y="32" width="60" height="44" rx="6" opacity="0.5"/>

    <!-- Middle tab -->
    <rect x="32" y="42" width="60" height="44" rx="6" opacity="0.7"/>

    <!-- Front tab -->
    <rect x="40" y="52" width="60" height="44" rx="6"/>
  </g>

  <!-- Connection line showing grouping -->
  <rect x="24" y="76" width="76" height="4" rx="2" fill="#ffffff" opacity="0.9"/>
  <rect x="24" y="84" width="60" height="4" rx="2" fill="#ffffff" opacity="0.7"/>
  <rect x="24" y="92" width="44" height="4" rx="2" fill="#ffffff" opacity="0.5"/>
</svg>
